<h1>이미지 속성 변경</h1>

<img id="image" alt="이미지가 여기에 표시됩니다.">

<button id="imageButton">이미지 보이기</button>

<script>
let image = document.getElementById("image");
let button = document.getElementById("imageButton");

button.addEventListener("click", function() {
    image.src = "https://placehold.co/300x200";
    image.width = 300;
    image.height = 200;
});
</script>
